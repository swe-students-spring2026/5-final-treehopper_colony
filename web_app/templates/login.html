{% extends 'base.html' %} 

{% block container %}
<h2>Login</h2>
<form action="/login" method="POST">
    <label>Email Address (Username):</label>
    <input type="email" name="email" required>
    
    <label>Password:</label>
    <input type="password" name="password" required>
    
    <button type="submit">Login</button>
</form>
{% endblock %}
