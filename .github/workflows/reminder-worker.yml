on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reminder_worker
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv install --dev

      - name: Lint with pylint
        run: |
          pipenv run pylint reminder_service.py email_service.py db.py worker.py --fail-under=5

      - name: Test with pytest
        run: |
          PYTHONPATH=. pipenv run pytest tests/ --cov=. --cov-report=term-missing
  deliver:
    runs-on: ubuntu-latest
    needs: test 
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./reminder_worker
          push: true
          tags: csl9997/reminder-worker:latest